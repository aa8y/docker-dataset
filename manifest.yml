parameters:
  repository: aa8y/postgres-dataset
  platforms: linux/amd64,linux/arm64
templates:
  # Each image carries exactly one dataset. Per-dataset sources/prereqs are
  # declared per tag below and passed to the Dockerfile as build args; optional
  # ones are emitted only when the tag defines them (Mustache sections).
  build: >
    docker buildx build --load ${PLATFORM:+--platform "$PLATFORM"}
    --build-arg DATASET={{dataset}}
    --build-arg 'EXTRACT_URL={{{extractUrl}}}'
    --build-arg 'SQL_FILES={{{sqlFiles}}}'
    {{#extraPrereqs}}--build-arg 'EXTRA_PREREQS={{{.}}}'{{/extraPrereqs}}
    {{#dbExtension}}--build-arg DB_EXTENSION={{.}}{{/dbExtension}}
    {{#cdDir}}--build-arg 'CD_DIR={{{.}}}'{{/cdDir}}
    {{#indexMethod}}--build-arg INDEX_METHOD={{.}}{{/indexMethod}}
    -t {{{repository}}}:{{tag}} {{{context}}}
  test: REPOSITORY={{{repository}}} bash test/integration/run.sh {{tag}} {{dataset}}
  push: >
    docker buildx build --push --platform {{{platforms}}}
    --build-arg DATASET={{dataset}}
    --build-arg 'EXTRACT_URL={{{extractUrl}}}'
    --build-arg 'SQL_FILES={{{sqlFiles}}}'
    {{#extraPrereqs}}--build-arg 'EXTRA_PREREQS={{{.}}}'{{/extraPrereqs}}
    {{#dbExtension}}--build-arg DB_EXTENSION={{.}}{{/dbExtension}}
    {{#cdDir}}--build-arg 'CD_DIR={{{.}}}'{{/cdDir}}
    {{#indexMethod}}--build-arg INDEX_METHOD={{.}}{{/indexMethod}}
    -t {{{repository}}}:{{tag}} {{{context}}}
contexts:
  postgres:
    tagKeys: dataset
    # Shared assertions for every postgres tag (the POSTGRES_* env wiring and
    # init-script dir). Scoped to this context -- structureTest configs trickle
    # down and concatenate, so a global block would wrongly apply to mysql too.
    structureTest:
      configs:
        - test/config/common.yaml
    tags:
      airlines:
        extractUrl: https://edu.postgrespro.ru/demo-20250901-3m.sql.gz
        sqlFiles: airlines.sql
        structureTest:
          configs:
            - test/config/airlines.yaml
      adventureworks:
        extractUrl: https://github.com/lorint/AdventureWorks-for-Postgres.git
        sqlFiles: AdventureWorks-for-Postgres/install.sql
        extraPrereqs: ruby
        cdDir: /docker-entrypoint-initdb.d/adventureworks
        structureTest:
          configs:
            - test/config/adventureworks.yaml
      dellstore:
        extractUrl: https://ftp.postgresql.org/pub/projects/pgFoundry/dbsamples/dellstore2/dellstore2-normal-1.0/dellstore2-normal-1.0.tar.gz
        sqlFiles: dellstore2-normal-1.0/dellstore2-normal-1.0.sql
        structureTest:
          configs:
            - test/config/dellstore.yaml
      frenchtowns:
        extractUrl: https://ftp.postgresql.org/pub/projects/pgFoundry/dbsamples/french-towns-communes-francais/french-towns-communes-francaises-1.0/french-towns-communes-francaises-1.0.tar.gz
        sqlFiles: french-towns-communes-francaises.sql
        structureTest:
          configs:
            - test/config/frenchtowns.yaml
      iso3166:
        extractUrl: https://ftp.postgresql.org/pub/projects/pgFoundry/dbsamples/iso-3166/iso-3166-1.0/iso-3166-1.0.tar.gz
        sqlFiles: iso-3166/iso-3166.sql
        structureTest:
          configs:
            - test/config/iso3166.yaml
      moma:
        extractUrl: >-
          https://media.githubusercontent.com/media/MuseumofModernArt/collection/main/Artworks.csv
          https://media.githubusercontent.com/media/MuseumofModernArt/collection/main/Artists.csv
        sqlFiles: moma.sql
        cdDir: /docker-entrypoint-initdb.d/moma
        structureTest:
          configs:
            - test/config/moma.yaml
      omdb:
        extractUrl: https://github.com/df7cb/omdb-postgresql.git
        sqlFiles: >-
          omdb-postgresql/00-drop-tables.sql
          omdb-postgresql/12-kind.sql
          omdb-postgresql/13-schema.sql
          omdb-postgresql/20-import.sql
          omdb-postgresql/30-duplicates.sql
          omdb-postgresql/31-primary-keys.sql
          omdb-postgresql/40-clean-orphans.sql
          omdb-postgresql/41-foreign-keys.sql
          omdb-postgresql/50-views.sql
          omdb-postgresql/52-category-en.sql
          omdb-postgresql/55-purge_dirty.sql
          omdb-postgresql/60-log.sql
        dbExtension: tsm_system_rows
        cdDir: /docker-entrypoint-initdb.d
        structureTest:
          configs:
            - test/config/omdb.yaml
      pagila:
        extractUrl: https://github.com/devrimgunduz/pagila.git
        sqlFiles: pagila/pagila-schema.sql pagila/pagila-data.sql
        structureTest:
          configs:
            - test/config/pagila.yaml
      # StackExchange sites all share one schema, so they all build through the
      # shared scripts/stackexchange hooks (each site's scripts/<site> dir is a
      # symlink to it). Adding a site is just a tag here + a structure-test
      # config + an expected/<site>.json floor file.
      stackexchange-beer:
        dataset: beer
        extractUrl: https://archive.org/download/stackexchange/beer.stackexchange.com.7z
        sqlFiles: beer.sql
        extraPrereqs: p7zip python3 py3-lxml
        structureTest:
          configs:
            - test/config/stackexchange-beer.yaml
      stackexchange-coffee:
        dataset: coffee
        extractUrl: https://archive.org/download/stackexchange/coffee.stackexchange.com.7z
        sqlFiles: coffee.sql
        extraPrereqs: p7zip python3 py3-lxml
        structureTest:
          configs:
            - test/config/stackexchange-coffee.yaml
      stackexchange-poker:
        dataset: poker
        extractUrl: https://archive.org/download/stackexchange/poker.stackexchange.com.7z
        sqlFiles: poker.sql
        extraPrereqs: p7zip python3 py3-lxml
        structureTest:
          configs:
            - test/config/stackexchange-poker.yaml
      stackexchange-woodworking:
        dataset: woodworking
        extractUrl: https://archive.org/download/stackexchange/woodworking.stackexchange.com.7z
        sqlFiles: woodworking.sql
        extraPrereqs: p7zip python3 py3-lxml
        structureTest:
          configs:
            - test/config/stackexchange-woodworking.yaml
      stackexchange-chess:
        dataset: chess
        extractUrl: https://archive.org/download/stackexchange/chess.stackexchange.com.7z
        sqlFiles: chess.sql
        extraPrereqs: p7zip python3 py3-lxml
        structureTest:
          configs:
            - test/config/stackexchange-chess.yaml
      stackexchange-cooking:
        dataset: cooking
        extractUrl: https://archive.org/download/stackexchange/cooking.stackexchange.com.7z
        sqlFiles: cooking.sql
        extraPrereqs: p7zip python3 py3-lxml
        structureTest:
          configs:
            - test/config/stackexchange-cooking.yaml
      sportsdb: &sportsdb
        extractUrl: >-
          https://raw.githubusercontent.com/yugabyte/yugabyte-db/master/sample/sportsdb_tables.sql
          https://raw.githubusercontent.com/yugabyte/yugabyte-db/master/sample/sportsdb_inserts.sql
          https://raw.githubusercontent.com/yugabyte/yugabyte-db/master/sample/sportsdb_indexes.sql
          https://raw.githubusercontent.com/yugabyte/yugabyte-db/master/sample/sportsdb_constraints.sql
          https://raw.githubusercontent.com/yugabyte/yugabyte-db/master/sample/sportsdb_fks.sql
        sqlFiles: sportsdb_tables.sql sportsdb_inserts.sql sportsdb_indexes.sql sportsdb_constraints.sql sportsdb_fks.sql
        indexMethod: btree
        structureTest:
          configs:
            - test/config/yugabyte-sportsdb.yaml
      yugabyte-sportsdb:
        <<: *sportsdb
        dataset: sportsdb
      yugabyte-chinook:
        dataset: chinook
        extractUrl: >-
          https://raw.githubusercontent.com/yugabyte/yugabyte-db/master/sample/chinook_ddl.sql
          https://raw.githubusercontent.com/yugabyte/yugabyte-db/master/sample/chinook_genres_artists_albums.sql
          https://raw.githubusercontent.com/yugabyte/yugabyte-db/master/sample/chinook_songs.sql
        sqlFiles: chinook_ddl.sql chinook_genres_artists_albums.sql chinook_songs.sql
        structureTest:
          configs:
            - test/config/yugabyte-chinook.yaml
      yugabyte-northwind:
        dataset: northwind
        extractUrl: >-
          https://raw.githubusercontent.com/yugabyte/yugabyte-db/master/sample/northwind_ddl.sql
          https://raw.githubusercontent.com/yugabyte/yugabyte-db/master/sample/northwind_data.sql
        sqlFiles: northwind_ddl.sql northwind_data.sql
        structureTest:
          configs:
            - test/config/yugabyte-northwind.yaml
      yugabyte-pgexercises:
        dataset: pgexercises
        extractUrl: >-
          https://raw.githubusercontent.com/yugabyte/yugabyte-db/master/sample/clubdata_ddl.sql
          https://raw.githubusercontent.com/yugabyte/yugabyte-db/master/sample/clubdata_data.sql
        sqlFiles: clubdata_ddl.sql clubdata_data.sql
        structureTest:
          configs:
            - test/config/yugabyte-pgexercises.yaml
      usda:
        extractUrl: https://ftp.postgresql.org/pub/projects/pgFoundry/dbsamples/usda/usda-r18-1.0/usda-r18-1.0.tar.gz
        sqlFiles: usda-r18-1.0/usda.sql
        structureTest:
          configs:
            - test/config/usda.yaml
      world: &world
        extractUrl: https://ftp.postgresql.org/pub/projects/pgFoundry/dbsamples/world/world-1.0/world-1.0.tar.gz
        sqlFiles: dbsamples-0.1/world/world.sql
        structureTest:
          configs:
            - test/config/world.yaml
      # `all` is retired (multi-dataset images are legacy). `latest` now tracks a
      # single representative dataset.
      latest:
        <<: *world
        dataset: world
  # MySQL images. Built on a thin Alpine MariaDB base (there is no official
  # Alpine MySQL image; MariaDB is the MySQL drop-in Alpine itself ships) and
  # published under a separate repository. The build/test/push templates are
  # the MySQL flavours (fewer build args than postgres; test runs the MySQL
  # smoke-test script) and override the global postgres ones for this context.
  mysql:
    tagKeys: dataset
    parameters:
      repository: aa8y/mysql-dataset
    structureTest:
      configs:
        - test/config/mysql/common.yaml
    templates:
      build: >
        docker buildx build --load ${PLATFORM:+--platform "$PLATFORM"}
        --build-arg DATASET={{dataset}}
        --build-arg 'EXTRACT_URL={{{extractUrl}}}'
        --build-arg 'SQL_FILES={{{sqlFiles}}}'
        {{#extraPrereqs}}--build-arg 'EXTRA_PREREQS={{{.}}}'{{/extraPrereqs}}
        -t {{{repository}}}:{{tag}} {{{context}}}
      test: REPOSITORY={{{repository}}} bash test/integration/run-mysql.sh {{tag}} {{dataset}}
      push: >
        docker buildx build --push --platform {{{platforms}}}
        --build-arg DATASET={{dataset}}
        --build-arg 'EXTRACT_URL={{{extractUrl}}}'
        --build-arg 'SQL_FILES={{{sqlFiles}}}'
        {{#extraPrereqs}}--build-arg 'EXTRA_PREREQS={{{.}}}'{{/extraPrereqs}}
        -t {{{repository}}}:{{tag}} {{{context}}}
    tags:
      # Sakila is MySQL's own sample database (the original of the model pagila
      # ports to Postgres). Ships schema + data as separate files in a tarball.
      sakila:
        extractUrl: https://downloads.mysql.com/docs/sakila-db.tar.gz
        sqlFiles: sakila-db/sakila-schema.sql sakila-db/sakila-data.sql
        structureTest:
          configs:
            - test/config/mysql/sakila.yaml
      # MySQL's canonical `world` sample (city, country, countrylanguage) -- the
      # same three tables as the Postgres `world` dataset.
      world: &world
        extractUrl: https://downloads.mysql.com/docs/world-db.tar.gz
        sqlFiles: world-db/world.sql
        structureTest:
          configs:
            - test/config/mysql/world.yaml
      # Chinook digital-media store. The vendor ships a MySQL-specific script as
      # a GitHub release asset; the build strips its `CREATE DATABASE Chinook` /
      # `USE` so it loads into the lowercase `chinook` database.
      chinook:
        extractUrl: https://github.com/lerocha/chinook-database/releases/download/v1.4.5/Chinook_MySql.sql
        sqlFiles: Chinook_MySql.sql
        structureTest:
          configs:
            - test/config/mysql/chinook.yaml
      # Northwind: the classic Microsoft small-business sample, ported to MySQL
      # by dalers/mywind. The build strips its `CREATE SCHEMA northwind` / `USE`
      # (the table DDL is schema-qualified to `northwind`, which the header
      # creates).
      northwind:
        extractUrl: https://github.com/dalers/mywind.git
        sqlFiles: mywind/northwind.sql mywind/northwind-data.sql
        structureTest:
          configs:
            - test/config/mysql/northwind.yaml
      # MoMA research collection. Published only as CSV, so the schema is
      # authored in-repo (mysql/scripts/moma) and the CSVs are bulk-loaded at
      # start with server-side LOAD DATA INFILE. Counts drift between builds (the
      # CSVs are refreshed upstream), so the smoke test records floors.
      moma:
        extractUrl: >-
          https://media.githubusercontent.com/media/MuseumofModernArt/collection/main/Artworks.csv
          https://media.githubusercontent.com/media/MuseumofModernArt/collection/main/Artists.csv
        sqlFiles: moma.sql
        structureTest:
          configs:
            - test/config/mysql/moma.yaml
      # Tier 1 hand-translated PostgreSQL datasets. These ship only as
      # PostgreSQL dumps, but are plain DDL + data (no PL/pgSQL, no extensions),
      # so the shared scripts/pgsql transform hook rewrites the dialect at build
      # time (COPY -> INSERT, type/identifier/sequence fixes). Each dataset's
      # scripts/<dataset> dir is a symlink to scripts/pgsql; only python3 is
      # needed beyond the base tools.
      iso3166:
        extractUrl: https://ftp.postgresql.org/pub/projects/pgFoundry/dbsamples/iso-3166/iso-3166-1.0/iso-3166-1.0.tar.gz
        sqlFiles: iso-3166/iso-3166.sql
        extraPrereqs: python3
        structureTest:
          configs:
            - test/config/mysql/iso3166.yaml
      frenchtowns:
        extractUrl: https://ftp.postgresql.org/pub/projects/pgFoundry/dbsamples/french-towns-communes-francais/french-towns-communes-francaises-1.0/french-towns-communes-francaises-1.0.tar.gz
        sqlFiles: french-towns-communes-francaises.sql
        extraPrereqs: python3
        structureTest:
          configs:
            - test/config/mysql/frenchtowns.yaml
      usda:
        extractUrl: https://ftp.postgresql.org/pub/projects/pgFoundry/dbsamples/usda/usda-r18-1.0/usda-r18-1.0.tar.gz
        sqlFiles: usda-r18-1.0/usda.sql
        extraPrereqs: python3
        structureTest:
          configs:
            - test/config/mysql/usda.yaml
      pgexercises:
        extractUrl: >-
          https://raw.githubusercontent.com/yugabyte/yugabyte-db/master/sample/clubdata_ddl.sql
          https://raw.githubusercontent.com/yugabyte/yugabyte-db/master/sample/clubdata_data.sql
        sqlFiles: clubdata_ddl.sql clubdata_data.sql
        extraPrereqs: python3
        structureTest:
          configs:
            - test/config/mysql/pgexercises.yaml
      # Tier 2 hand-translated PostgreSQL datasets. Larger / slightly more
      # involved than tier 1 but still handled by the shared scripts/pgsql hook:
      # sportsdb is INSERT-based across five files with sequences, constraints,
      # FKs and Yugabyte `USING lsm` indexes; dellstore2 is COPY-based plus a
      # PL/pgSQL stored function, which the hook drops (no mechanical MySQL
      # translation -- the schema and all data still load faithfully).
      dellstore:
        extractUrl: https://ftp.postgresql.org/pub/projects/pgFoundry/dbsamples/dellstore2/dellstore2-normal-1.0/dellstore2-normal-1.0.tar.gz
        sqlFiles: dellstore2-normal-1.0/dellstore2-normal-1.0.sql
        extraPrereqs: python3
        structureTest:
          configs:
            - test/config/mysql/dellstore.yaml
      sportsdb:
        extractUrl: >-
          https://raw.githubusercontent.com/yugabyte/yugabyte-db/master/sample/sportsdb_tables.sql
          https://raw.githubusercontent.com/yugabyte/yugabyte-db/master/sample/sportsdb_inserts.sql
          https://raw.githubusercontent.com/yugabyte/yugabyte-db/master/sample/sportsdb_indexes.sql
          https://raw.githubusercontent.com/yugabyte/yugabyte-db/master/sample/sportsdb_constraints.sql
          https://raw.githubusercontent.com/yugabyte/yugabyte-db/master/sample/sportsdb_fks.sql
        sqlFiles: sportsdb_tables.sql sportsdb_inserts.sql sportsdb_indexes.sql sportsdb_constraints.sql sportsdb_fks.sql
        extraPrereqs: python3
        structureTest:
          configs:
            - test/config/mysql/sportsdb.yaml
      # StackExchange sites. Each ships as per-table XML in a 7z archive (no
      # SQL), so -- exactly like the postgres side -- every site builds through
      # the shared scripts/stackexchange hooks (each site's scripts/<site> dir
      # is a symlink to it): the extract hook un-7z's the dump and the transform
      # hook converts the XML to a MySQL init script (CREATE TABLE + batched
      # INSERTs + indexes). The transform is the MySQL-emitting counterpart of
      # the postgres one; adding a site is just a tag here + a structure-test
      # config + an expected/mysql/<site>.json floor file.
      stackexchange-beer:
        dataset: beer
        extractUrl: https://archive.org/download/stackexchange/beer.stackexchange.com.7z
        sqlFiles: beer.sql
        extraPrereqs: p7zip python3 py3-lxml
        structureTest:
          configs:
            - test/config/mysql/stackexchange-beer.yaml
      stackexchange-coffee:
        dataset: coffee
        extractUrl: https://archive.org/download/stackexchange/coffee.stackexchange.com.7z
        sqlFiles: coffee.sql
        extraPrereqs: p7zip python3 py3-lxml
        structureTest:
          configs:
            - test/config/mysql/stackexchange-coffee.yaml
      stackexchange-poker:
        dataset: poker
        extractUrl: https://archive.org/download/stackexchange/poker.stackexchange.com.7z
        sqlFiles: poker.sql
        extraPrereqs: p7zip python3 py3-lxml
        structureTest:
          configs:
            - test/config/mysql/stackexchange-poker.yaml
      stackexchange-woodworking:
        dataset: woodworking
        extractUrl: https://archive.org/download/stackexchange/woodworking.stackexchange.com.7z
        sqlFiles: woodworking.sql
        extraPrereqs: p7zip python3 py3-lxml
        structureTest:
          configs:
            - test/config/mysql/stackexchange-woodworking.yaml
      stackexchange-chess:
        dataset: chess
        extractUrl: https://archive.org/download/stackexchange/chess.stackexchange.com.7z
        sqlFiles: chess.sql
        extraPrereqs: p7zip python3 py3-lxml
        structureTest:
          configs:
            - test/config/mysql/stackexchange-chess.yaml
      stackexchange-cooking:
        dataset: cooking
        extractUrl: https://archive.org/download/stackexchange/cooking.stackexchange.com.7z
        sqlFiles: cooking.sql
        extraPrereqs: p7zip python3 py3-lxml
        structureTest:
          configs:
            - test/config/mysql/stackexchange-cooking.yaml
      # `latest` tracks a single representative dataset, mirroring postgres.
      latest:
        <<: *world
        dataset: world
