parameters:
  repository: aa8y/postgres-dataset
  platforms: linux/amd64,linux/arm64
templates:
  build: docker buildx build --load ${PLATFORM:+--platform "$PLATFORM"} --build-arg DATASETS={{datasets}} -t {{{repository}}}:{{tag}} {{{context}}}
  test: REPOSITORY={{{repository}}} bash test/integration/run.sh {{tag}} {{datasets}}
  push: docker buildx build --push --platform {{{platforms}}} --build-arg DATASETS={{datasets}} -t {{{repository}}}:{{tag}} {{{context}}}
structureTest:
  configs:
    - test/config/common.yaml
contexts:
  postgres:
    tagKeys: datasets
    tags:
      adventureworks:
        structureTest:
          configs:
            - test/config/adventureworks.yaml
      dellstore:
        structureTest:
          configs:
            - test/config/dellstore.yaml
      frenchtowns:
        structureTest:
          configs:
            - test/config/frenchtowns.yaml
      iso3166:
        structureTest:
          configs:
            - test/config/iso3166.yaml
      omdb:
        structureTest:
          configs:
            - test/config/omdb.yaml
      sportsdb:
        structureTest:
          configs:
            - test/config/yugabyte-sportsdb.yaml
      yugabyte-sportsdb:
        datasets: sportsdb
        structureTest:
          configs:
            - test/config/yugabyte-sportsdb.yaml
      usda:
        structureTest:
          configs:
            - test/config/usda.yaml
      world:
        structureTest:
          configs:
            - test/config/world.yaml
      all:
        datasets: adventureworks,dellstore,frenchtowns,iso3166,omdb,sportsdb,usda,world
        structureTest:
          configs:
            - test/config/adventureworks.yaml
            - test/config/dellstore.yaml
            - test/config/frenchtowns.yaml
            - test/config/iso3166.yaml
            - test/config/omdb.yaml
            - test/config/yugabyte-sportsdb.yaml
            - test/config/usda.yaml
            - test/config/world.yaml
      latest:
        datasets: adventureworks,dellstore,frenchtowns,iso3166,omdb,sportsdb,usda,world
        structureTest:
          configs:
            - test/config/adventureworks.yaml
            - test/config/dellstore.yaml
            - test/config/frenchtowns.yaml
            - test/config/iso3166.yaml
            - test/config/omdb.yaml
            - test/config/yugabyte-sportsdb.yaml
            - test/config/usda.yaml
            - test/config/world.yaml
