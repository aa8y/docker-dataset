schemaVersion: "2.0.0"

# The StackExchange "cooking" (Seasoned Advice) site dump ships as per-table XML
# (no SQL); the shared stackexchange transform hook converts each table to
# CREATE TABLE + an inline COPY block + indexes. Verify the wrapper SQL plus the
# eight tables and a few COPY blocks.

fileExistenceTests:
  - name: "cooking init script exists"
    path: "/docker-entrypoint-initdb.d/cooking.sql"
    shouldExist: true

fileContentTests:
  - name: "cooking init script creates and connects to database"
    path: "/docker-entrypoint-initdb.d/cooking.sql"
    expectedContents:
      - "CREATE DATABASE cooking"
      - '\\c cooking'

  - name: "cooking declares all expected tables"
    path: "/docker-entrypoint-initdb.d/cooking.sql"
    expectedContents:
      - "CREATE TABLE Users[ (]"
      - "CREATE TABLE Posts[ (]"
      - "CREATE TABLE Comments[ (]"
      - "CREATE TABLE Votes[ (]"
      - "CREATE TABLE Badges[ (]"
      - "CREATE TABLE Tags[ (]"
      - "CREATE TABLE PostLinks[ (]"
      - "CREATE TABLE PostHistory[ (]"

  - name: "cooking loads data into representative tables"
    path: "/docker-entrypoint-initdb.d/cooking.sql"
    expectedContents:
      - "COPY Users[ (]"
      - "COPY Posts[ (]"
      - "COPY PostHistory[ (]"
