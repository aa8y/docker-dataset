schemaVersion: "2.0.0"

# Static assertions on the shipped database file. sportsdb is built at image
# build time into /data/sportsdb.db. (Row counts are asserted by the integration
# smoke test, since the database is a binary file the structure test cannot
# introspect.)

fileExistenceTests:
  - name: "sportsdb database file exists"
    path: "/data/sportsdb.db"
    shouldExist: true
