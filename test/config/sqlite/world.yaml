schemaVersion: "2.0.0"

# Static assertions on the shipped database file. world is built at image
# build time into /data/world.db. (Row counts are asserted by the integration
# smoke test, since the database is a binary file the structure test cannot
# introspect.)

fileExistenceTests:
  - name: "world database file exists"
    path: "/data/world.db"
    shouldExist: true
