schemaVersion: "2.0.0"

# Static assertions on the shipped database file. pgexercises is built at image
# build time into /data/pgexercises.db. (Row counts are asserted by the integration
# smoke test, since the database is a binary file the structure test cannot
# introspect.)

fileExistenceTests:
  - name: "pgexercises database file exists"
    path: "/data/pgexercises.db"
    shouldExist: true
