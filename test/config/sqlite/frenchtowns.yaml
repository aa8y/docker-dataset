schemaVersion: "2.0.0"

# Static assertions on the shipped database file. frenchtowns is built at image
# build time into /data/frenchtowns.db. (Row counts are asserted by the integration
# smoke test, since the database is a binary file the structure test cannot
# introspect.)

fileExistenceTests:
  - name: "frenchtowns database file exists"
    path: "/data/frenchtowns.db"
    shouldExist: true
