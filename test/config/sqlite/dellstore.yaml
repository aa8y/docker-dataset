schemaVersion: "2.0.0"

# Static assertions on the shipped database file. dellstore is built at image
# build time into /data/dellstore.db. (Row counts are asserted by the integration
# smoke test, since the database is a binary file the structure test cannot
# introspect.)

fileExistenceTests:
  - name: "dellstore database file exists"
    path: "/data/dellstore.db"
    shouldExist: true
