schemaVersion: "2.0.0"

# Static assertions on the shipped database file. moma is built at image
# build time into /data/moma.db. (Row counts are asserted by the integration
# smoke test, since the database is a binary file the structure test cannot
# introspect.)

fileExistenceTests:
  - name: "moma database file exists"
    path: "/data/moma.db"
    shouldExist: true
