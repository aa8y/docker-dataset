schemaVersion: "2.0.0"

# Static assertions on the shipped database file. The StackExchange "beer" site
# dump is converted from XML at build time into /data/beer.db. Counts drift
# (the archive.org dump is refreshed over time), so the integration smoke test
# records floors.

fileExistenceTests:
  - name: "beer database file exists"
    path: "/data/beer.db"
    shouldExist: true
