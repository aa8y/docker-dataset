schemaVersion: "2.0.0"

# Static assertions on the shipped database file. usda is built at image
# build time into /data/usda.db. (Row counts are asserted by the integration
# smoke test, since the database is a binary file the structure test cannot
# introspect.)

fileExistenceTests:
  - name: "usda database file exists"
    path: "/data/usda.db"
    shouldExist: true
