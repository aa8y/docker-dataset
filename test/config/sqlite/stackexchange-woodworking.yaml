schemaVersion: "2.0.0"

# Static assertions on the shipped database file. The StackExchange "woodworking" site
# dump is converted from XML at build time into /data/woodworking.db. Counts drift
# (the archive.org dump is refreshed over time), so the integration smoke test
# records floors.

fileExistenceTests:
  - name: "woodworking database file exists"
    path: "/data/woodworking.db"
    shouldExist: true
