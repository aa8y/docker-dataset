schemaVersion: "2.0.0"

fileExistenceTests:
  - name: "world init script exists"
    path: "/docker-entrypoint-initdb.d/world.sql"
    shouldExist: true

fileContentTests:
  - name: "world init script creates and connects to database"
    path: "/docker-entrypoint-initdb.d/world.sql"
    expectedContents:
      - "CREATE DATABASE world"
      - '\\c world'

  - name: "world declares all expected tables"
    path: "/docker-entrypoint-initdb.d/world.sql"
    expectedContents:
      - "CREATE TABLE city[ (]"
      - "CREATE TABLE country[ (]"
      - "CREATE TABLE countrylanguage[ (]"

  - name: "world loads data into every table"
    path: "/docker-entrypoint-initdb.d/world.sql"
    expectedContents:
      - "COPY city[ (]"
      - "COPY country[ (]"
      - "COPY countrylanguage[ (]"
