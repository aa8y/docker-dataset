schemaVersion: "2.0.0"

# The StackExchange "beer" site dump ships as per-table XML (no SQL); the beer
# transform hook converts each table to CREATE TABLE + an inline COPY block +
# indexes. CockroachDB creates the database (COCKROACH_DATABASE) and runs this
# script against it, so there is no CREATE DATABASE header.

fileExistenceTests:
  - name: "beer init script exists"
    path: "/docker-entrypoint-initdb.d/beer.sql"
    shouldExist: true

fileContentTests:
  - name: "beer declares all expected tables"
    path: "/docker-entrypoint-initdb.d/beer.sql"
    expectedContents:
      - "CREATE TABLE Users[ (]"
      - "CREATE TABLE Posts[ (]"
      - "CREATE TABLE Comments[ (]"
      - "CREATE TABLE Votes[ (]"
      - "CREATE TABLE Badges[ (]"
      - "CREATE TABLE Tags[ (]"
      - "CREATE TABLE PostLinks[ (]"
      - "CREATE TABLE PostHistory[ (]"

  - name: "beer loads data into representative tables"
    path: "/docker-entrypoint-initdb.d/beer.sql"
    expectedContents:
      - "COPY Users[ (]"
      - "COPY Posts[ (]"
      - "COPY PostHistory[ (]"
