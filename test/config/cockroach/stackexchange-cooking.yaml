schemaVersion: "2.0.0"

fileExistenceTests:
  - name: "cooking init script exists"
    path: "/docker-entrypoint-initdb.d/cooking.sql"
    shouldExist: true

fileContentTests:
  - name: "cooking declares all expected tables"
    path: "/docker-entrypoint-initdb.d/cooking.sql"
    expectedContents:
      - "CREATE TABLE Users[ (]"
      - "CREATE TABLE Posts[ (]"
      - "CREATE TABLE Comments[ (]"
      - "CREATE TABLE Votes[ (]"
      - "CREATE TABLE Badges[ (]"
      - "CREATE TABLE Tags[ (]"
      - "CREATE TABLE PostLinks[ (]"
      - "CREATE TABLE PostHistory[ (]"

  - name: "cooking loads data into representative tables"
    path: "/docker-entrypoint-initdb.d/cooking.sql"
    expectedContents:
      - "IMPORT INTO Users[ (]"
      - "IMPORT INTO Posts[ (]"
      - "IMPORT INTO PostHistory[ (]"
