    expectedContents:
      - "COPY data_src[ (]"
      - "COPY datsrcln[ (]"
      - "COPY deriv_cd[ (]"
      - "COPY fd_group[ (]"
      - "COPY food_des[ (]"
      - "COPY footnote[ (]"
      - "COPY nut_data[ (]"
