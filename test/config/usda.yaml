schemaVersion: "2.0.0"

fileExistenceTests:
  - name: "usda init script exists"
    path: "/docker-entrypoint-initdb.d/usda.sql"
    shouldExist: true

fileContentTests:
  - name: "usda init script creates and connects to database"
    path: "/docker-entrypoint-initdb.d/usda.sql"
    expectedContents:
      - "CREATE DATABASE usda"
      - '\\c usda'
