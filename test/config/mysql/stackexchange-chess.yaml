schemaVersion: "2.0.0"

# The StackExchange "chess" site dump ships as per-table XML in a 7z archive
# (no SQL); the shared MySQL stackexchange transform hook converts each table to
# CREATE TABLE + batched INSERTs + indexes. Verify the wrapper SQL plus the
# eight tables and a few INSERT blocks. Counts drift (the archive.org dump is
# refreshed over time), so the integration smoke test records floors.

fileExistenceTests:
  - name: "chess init script exists"
    path: "/docker-entrypoint-initdb.d/chess.sql"
    shouldExist: true

fileContentTests:
  - name: "chess init script creates and uses the database"
    path: "/docker-entrypoint-initdb.d/chess.sql"
    expectedContents:
      - "CREATE DATABASE IF NOT EXISTS `chess`"
      - "USE `chess`"

  - name: "chess declares all expected tables"
    path: "/docker-entrypoint-initdb.d/chess.sql"
    expectedContents:
      - "CREATE TABLE `Users`[ (]"
      - "CREATE TABLE `Posts`[ (]"
      - "CREATE TABLE `Comments`[ (]"
      - "CREATE TABLE `Votes`[ (]"
      - "CREATE TABLE `Badges`[ (]"
      - "CREATE TABLE `Tags`[ (]"
      - "CREATE TABLE `PostLinks`[ (]"
      - "CREATE TABLE `PostHistory`[ (]"

  - name: "chess loads data into representative tables"
    path: "/docker-entrypoint-initdb.d/chess.sql"
    expectedContents:
      - "INSERT INTO `Users`[ (]"
      - "INSERT INTO `Posts`[ (]"
      - "INSERT INTO `PostHistory`[ (]"
