schemaVersion: "2.0.0"

# The StackExchange "coffee" site dump ships as per-table XML (no SQL); the
# shared stackexchange transform hook converts each table to CREATE TABLE + an
# inline COPY block + indexes. Verify the wrapper SQL plus the eight tables and
# a few COPY blocks.

fileExistenceTests:
  - name: "coffee init script exists"
    path: "/docker-entrypoint-initdb.d/coffee.sql"
    shouldExist: true

fileContentTests:
  - name: "coffee init script creates and connects to database"
    path: "/docker-entrypoint-initdb.d/coffee.sql"
    expectedContents:
      - "CREATE DATABASE coffee"
      - '\\c coffee'

  - name: "coffee declares all expected tables"
    path: "/docker-entrypoint-initdb.d/coffee.sql"
    expectedContents:
      - "CREATE TABLE Users[ (]"
      - "CREATE TABLE Posts[ (]"
      - "CREATE TABLE Comments[ (]"
      - "CREATE TABLE Votes[ (]"
      - "CREATE TABLE Badges[ (]"
      - "CREATE TABLE Tags[ (]"
      - "CREATE TABLE PostLinks[ (]"
      - "CREATE TABLE PostHistory[ (]"

  - name: "coffee loads data into representative tables"
    path: "/docker-entrypoint-initdb.d/coffee.sql"
    expectedContents:
      - "COPY Users[ (]"
      - "COPY Posts[ (]"
      - "COPY PostHistory[ (]"
